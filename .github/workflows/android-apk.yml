name: Android APK CI

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  dev_apk:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app and sync Capacitor
        run: |
          npm run build
          npx cap sync android

      - name: Prepare Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Android signing secrets are not configured. Release APK will be unsigned."
            exit 0
          fi
          mkdir -p android/app/signing
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/signing/release.jks
          echo "ANDROID_KEYSTORE_FILE=$GITHUB_WORKSPACE/android/app/signing/release.jks" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build APKs
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug assembleRelease

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: gochat-mobile-apks
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error

  semantic_release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      released: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
      tag: ${{ steps.semantic.outputs.new_release_git_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Semantic release
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          branch: main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release_apk:
    if: github.ref == 'refs/heads/main' && needs.semantic_release.result == 'success' && needs.semantic_release.outputs.released == 'true'
    needs: semantic_release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.semantic_release.outputs.tag }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app and sync Capacitor
        run: |
          npm run build
          npx cap sync android

      - name: Prepare Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Android signing secrets are not configured. Release APK will be unsigned."
            exit 0
          fi
          mkdir -p android/app/signing
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/signing/release.jks
          echo "ANDROID_KEYSTORE_FILE=$GITHUB_WORKSPACE/android/app/signing/release.jks" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Build APKs
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug assembleRelease

      - name: Rename APKs
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk "gochat-mobile-${{ needs.semantic_release.outputs.version }}-debug.apk"
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk "gochat-mobile-${{ needs.semantic_release.outputs.version }}-release.apk"
          fi
          if [ -f android/app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk "gochat-mobile-${{ needs.semantic_release.outputs.version }}-release-unsigned.apk"
          fi

      - name: Upload APKs to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          files=("gochat-mobile-${{ needs.semantic_release.outputs.version }}-debug.apk")
          if [ -f "gochat-mobile-${{ needs.semantic_release.outputs.version }}-release.apk" ]; then
            files+=("gochat-mobile-${{ needs.semantic_release.outputs.version }}-release.apk")
          fi
          if [ -f "gochat-mobile-${{ needs.semantic_release.outputs.version }}-release-unsigned.apk" ]; then
            files+=("gochat-mobile-${{ needs.semantic_release.outputs.version }}-release-unsigned.apk")
          fi
          gh release upload "${{ needs.semantic_release.outputs.tag }}" "${files[@]}" --clobber
